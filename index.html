<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Stationery Quoter</title>
<link rel="stylesheet" href="https://use.typekit.net/mog0ylg.css" />
<style>
/* ============================================================
   QUOTING TOOL — VANILLA CSS
   Replaces Tailwind CDN. No external dependencies.
   ============================================================ */

:root {
  /* Stone palette */
  --stone-50:  #fafaf9;
  --stone-100: #f5f5f4;
  --stone-200: #e7e5e4;
  --stone-300: #d6d3d1;
  --stone-400: #a8a29e;
  --stone-500: #78716c;
  --stone-600: #57534e;
  --stone-700: #44403c;
  --stone-800: #292524;
  --stone-900: #1c1917;

  /* Accents */
  --amber-50:  #fffbeb;
  --rose-700:  #be123c;
  --white:     #ffffff;

  /* Brand */
  --bg:        #F5F0E8;
}

/* -------- Reset -------- */
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body { font-family: 'franklin-gothic-urw', sans-serif; font-weight: 400; color: var(--stone-900); background: var(--bg); }
input, select, textarea, button { font-family: inherit; font-size: inherit; color: inherit; }
button { background: none; border: 0; padding: 0; cursor: pointer; text-align: inherit; }
input, textarea, select { border: 0; outline: none; }
input[type="number"]::-webkit-outer-spin-button,
input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
input[type="number"] { -moz-appearance: textfield; }
select { appearance: none; -webkit-appearance: none; background-image: none; }
a { color: inherit; }
summary { cursor: pointer; }
details summary::-webkit-details-marker { display: none; }
pre { font-family: ui-monospace, Menlo, Monaco, Consolas, monospace; }

/* -------- Brand typography -------- */
.display          { font-family: 'garamond-premier-pro-display', Georgia, serif; font-weight: 400; letter-spacing: 0.005em; }
.display-italic   { font-family: 'garamond-premier-pro-display', Georgia, serif; font-style: italic; font-weight: 400; }
.subhead          { font-family: 'garamond-premier-pro', Georgia, serif; font-style: normal; font-weight: 400; }
.caption-italic   { font-family: 'garamond-premier-pro-caption', Georgia, serif; font-style: italic; font-weight: 400; }

/* -------- Layout: display & position -------- */
.block { display: block; }
.inline-flex { display: inline-flex; }
.flex { display: flex; }
.grid { display: grid; }
.relative { position: relative; }
.absolute { position: absolute; }
.fixed { position: fixed; }
.sticky { position: sticky; }
.inset-0 { top: 0; right: 0; bottom: 0; left: 0; }
.top-0 { top: 0; }
.right-0 { right: 0; }
.right-6 { right: 1.5rem; }
.bottom-6 { bottom: 1.5rem; }

.z-20 { z-index: 20; }
.z-30 { z-index: 30; }
.z-40 { z-index: 40; }

/* -------- Flex -------- */
.flex-1 { flex: 1 1 0%; }
.flex-wrap { flex-wrap: wrap; }
.flex-shrink-0 { flex-shrink: 0; }
.items-center { align-items: center; }
.items-end { align-items: flex-end; }
.items-baseline { align-items: baseline; }
.items-stretch { align-items: stretch; }
.justify-between { justify-content: space-between; }
.justify-end { justify-content: flex-end; }
.justify-center { justify-content: center; }
.self-end { align-self: flex-end; }

/* gap utilities */
.gap-1\.5 { gap: 0.375rem; }
.gap-2   { gap: 0.5rem; }
.gap-3   { gap: 0.75rem; }
.gap-4   { gap: 1rem; }
.gap-6   { gap: 1.5rem; }
.gap-x-6  { column-gap: 1.5rem; }
.gap-x-10 { column-gap: 2.5rem; }
.gap-y-3  { row-gap: 0.75rem; }
.gap-y-6  { row-gap: 1.5rem; }

/* -------- Grid -------- */
.grid-cols-1  { grid-template-columns: repeat(1, minmax(0, 1fr)); }
.grid-cols-2  { grid-template-columns: repeat(2, minmax(0, 1fr)); }
.grid-cols-3  { grid-template-columns: repeat(3, minmax(0, 1fr)); }
.grid-cols-12 { grid-template-columns: repeat(12, minmax(0, 1fr)); }
.col-span-2   { grid-column: span 2 / span 2; }
.col-span-12  { grid-column: span 12 / span 12; }

/* -------- Sizing -------- */
.min-h-screen { min-height: 100vh; }
.h-full { height: 100%; }
.w-full { width: 100%; }
.w-3\.5 { width: 0.875rem; }
.h-3\.5 { height: 0.875rem; }
.w-4 { width: 1rem; }
.h-4 { height: 1rem; }
.w-5 { width: 1.25rem; }
.h-5 { height: 1.25rem; }
.w-16 { width: 4rem; }
.w-20 { width: 5rem; }
.w-28 { width: 7rem; }
.w-32 { width: 8rem; }
.w-44 { width: 11rem; }

/* important variants for forced widths in narrow form rows */
.\!w-16 { width: 4rem !important; }
.\!w-28 { width: 7rem !important; }
.\!w-32 { width: 8rem !important; }
.\!w-44 { width: 11rem !important; }

.max-w-6xl { max-width: 72rem; }
.max-w-xl { max-width: 36rem; }
.max-h-64 { max-height: 16rem; }
.min-w-\[240px\] { min-width: 240px; }

/* -------- Spacing -------- */
/* margins */
.mx-auto { margin-left: auto; margin-right: auto; }
.ml-2 { margin-left: 0.5rem; }
.ml-6 { margin-left: 1.5rem; }
.ml-auto { margin-left: auto; }
.mt-0\.5 { margin-top: 0.125rem; }
.mt-1   { margin-top: 0.25rem; }
.mt-1\.5 { margin-top: 0.375rem; }
.mt-4   { margin-top: 1rem; }
.mt-6   { margin-top: 1.5rem; }
.mb-1 { margin-bottom: 0.25rem; }
.mb-2 { margin-bottom: 0.5rem; }
.mb-3 { margin-bottom: 0.75rem; }
.mb-4 { margin-bottom: 1rem; }
.mb-5 { margin-bottom: 1.25rem; }
.mb-6 { margin-bottom: 1.5rem; }

/* paddings */
.pb-1   { padding-bottom: 0.25rem; }
.pb-1\.5 { padding-bottom: 0.375rem; }
.pb-3   { padding-bottom: 0.75rem; }
.pb-8   { padding-bottom: 2rem; }
.pb-40  { padding-bottom: 10rem; }
.pl-3   { padding-left: 0.75rem; }
.pl-4   { padding-left: 1rem; }
.pl-6   { padding-left: 1.5rem; }
.pt-1   { padding-top: 0.25rem; }
.pt-4   { padding-top: 1rem; }
.pt-5   { padding-top: 1.25rem; }
.px-0 { padding-left: 0; padding-right: 0; }
.px-2 { padding-left: 0.5rem; padding-right: 0.5rem; }
.px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
.px-4 { padding-left: 1rem; padding-right: 1rem; }
.px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
.px-8 { padding-left: 2rem; padding-right: 2rem; }
.py-0\.5 { padding-top: 0.125rem; padding-bottom: 0.125rem; }
.py-1   { padding-top: 0.25rem; padding-bottom: 0.25rem; }
.py-1\.5 { padding-top: 0.375rem; padding-bottom: 0.375rem; }
.py-2   { padding-top: 0.5rem; padding-bottom: 0.5rem; }
.py-2\.5 { padding-top: 0.625rem; padding-bottom: 0.625rem; }
.py-3   { padding-top: 0.75rem; padding-bottom: 0.75rem; }
.py-4   { padding-top: 1rem; padding-bottom: 1rem; }
.py-5   { padding-top: 1.25rem; padding-bottom: 1.25rem; }
.py-6   { padding-top: 1.5rem; padding-bottom: 1.5rem; }
.py-10  { padding-top: 2.5rem; padding-bottom: 2.5rem; }
.py-12  { padding-top: 3rem; padding-bottom: 3rem; }

/* space-y-* (top margin on adjacent siblings) */
.space-y-0\.5 > * + * { margin-top: 0.125rem; }
.space-y-1\.5 > * + * { margin-top: 0.375rem; }
.space-y-2 > * + *    { margin-top: 0.5rem; }
.space-y-3 > * + *    { margin-top: 0.75rem; }
.space-y-4 > * + *    { margin-top: 1rem; }
.space-y-6 > * + *    { margin-top: 1.5rem; }
.space-y-10 > * + *   { margin-top: 2.5rem; }
.space-y-12 > * + *   { margin-top: 3rem; }

/* -------- Type sizes -------- */
.text-\[10px\] { font-size: 10px; }
.text-\[11px\] { font-size: 11px; }
.text-xs   { font-size: 0.75rem;  line-height: 1rem; }
.text-sm   { font-size: 0.875rem; line-height: 1.25rem; }
.text-base { font-size: 1rem;     line-height: 1.5rem; }
.text-lg   { font-size: 1.125rem; line-height: 1.75rem; }
.text-xl   { font-size: 1.25rem;  line-height: 1.75rem; }
.text-2xl  { font-size: 1.5rem;   line-height: 2rem; }
.text-3xl  { font-size: 1.875rem; line-height: 2.25rem; }
.text-4xl  { font-size: 2.25rem;  line-height: 2.5rem; }

/* -------- Type styling -------- */
.font-medium { font-weight: 500; }
.font-normal { font-weight: 400; }
.leading-none { line-height: 1; }
.leading-snug { line-height: 1.375; }
.uppercase { text-transform: uppercase; }
.normal-case { text-transform: none; }
.text-left { text-align: left; }
.text-right { text-align: right; }
.text-center { text-align: center; }
.tabular-nums { font-variant-numeric: tabular-nums; }
.truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.whitespace-pre-wrap { white-space: pre-wrap; }
.tracking-\[0\.12em\] { letter-spacing: 0.12em; }
.tracking-\[0\.14em\] { letter-spacing: 0.14em; }
.tracking-\[0\.16em\] { letter-spacing: 0.16em; }
.tracking-\[0\.2em\]  { letter-spacing: 0.2em; }
.tracking-normal { letter-spacing: normal; }

/* -------- Colors -------- */
.text-stone-400 { color: var(--stone-400); }
.text-stone-500 { color: var(--stone-500); }
.text-stone-600 { color: var(--stone-600); }
.text-stone-700 { color: var(--stone-700); }
.text-stone-900 { color: var(--stone-900); }
.text-amber-50  { color: var(--amber-50); }
.text-rose-700  { color: var(--rose-700); }

.bg-stone-900   { background-color: var(--stone-900); }
.bg-white       { background-color: var(--white); }
.bg-transparent { background-color: transparent; }

/* alpha-channel backgrounds */
.bg-stone-50\/50  { background-color: rgb(250 250 249 / 0.5); }
.bg-stone-100\/60 { background-color: rgb(245 245 244 / 0.6); }
.bg-stone-900\/30 { background-color: rgb(28 25 23 / 0.3); }
.bg-white\/60     { background-color: rgb(255 255 255 / 0.6); }

/* placeholder color */
.placeholder-stone-400::placeholder { color: var(--stone-400); }

/* -------- Borders -------- */
.border    { border: 1px solid var(--stone-200); }
.border-b  { border-bottom: 1px solid var(--stone-200); }
.border-t  { border-top: 1px solid var(--stone-200); }
.border-l-2 { border-left: 2px solid var(--stone-200); }
.border-t-2 { border-top: 2px solid var(--stone-200); }
.border-dashed { border-style: dashed; }
.border-transparent { border-color: transparent; }
.border-stone-100 { border-color: var(--stone-100); }
.border-stone-200 { border-color: var(--stone-200); }
.border-stone-300 { border-color: var(--stone-300); }
.border-stone-400 { border-color: var(--stone-400); }
.border-stone-900 { border-color: var(--stone-900); }
.last\:border-0:last-child { border-color: transparent; border-width: 0; }
.rounded-sm { border-radius: 0.125rem; }

/* -------- Effects -------- */
.shadow-lg  { box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); }
.shadow-2xl { box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25); }
.opacity-0  { opacity: 0; }
.opacity-70 { opacity: 0.7; }

.transition-colors {
  transition-property: color, background-color, border-color, text-decoration-color, fill, stroke;
  transition-duration: 150ms;
  transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
}
.transition-opacity {
  transition-property: opacity;
  transition-duration: 150ms;
  transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
}
.transition-all {
  transition-property: all;
  transition-duration: 150ms;
  transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
}

.backdrop-blur    { backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
.backdrop-blur-sm { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }

/* -------- Misc -------- */
.cursor-pointer { cursor: pointer; }
.list-none { list-style: none; }
.list-none::-webkit-details-marker { display: none; }
.overflow-auto { overflow: auto; }

/* -------- Hover states -------- */
.hover\:bg-stone-50:hover    { background-color: var(--stone-50); }
.hover\:bg-stone-800:hover   { background-color: var(--stone-800); }
.hover\:text-stone-900:hover { color: var(--stone-900); }
.hover\:text-rose-700:hover  { color: var(--rose-700); }
.hover\:border-stone-300:hover { border-color: var(--stone-300); }
.hover\:border-stone-700:hover { border-color: var(--stone-700); }
.hover\:border-stone-900:hover { border-color: var(--stone-900); }

/* -------- Focus states -------- */
.focus\:border-stone-700:focus { border-color: var(--stone-700); }
.focus\:border-stone-900:focus { border-color: var(--stone-900); }
.focus\:outline-none:focus     { outline: none; }

/* -------- Group hover (Tailwind pattern) -------- */
.group:hover .group-hover\:opacity-100 { opacity: 1; }

/* -------- Responsive (md: breakpoint, 768px) -------- */
@media (min-width: 768px) {
  .md\:col-span-2  { grid-column: span 2 / span 2; }
  .md\:col-span-3  { grid-column: span 3 / span 3; }
  .md\:col-span-7  { grid-column: span 7 / span 7; }
  .md\:grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
}

/* -------- Subtle scrollbar (gives drawer a refined feel) -------- */
.overflow-auto::-webkit-scrollbar { width: 8px; height: 8px; }
.overflow-auto::-webkit-scrollbar-track { background: transparent; }
.overflow-auto::-webkit-scrollbar-thumb { background: var(--stone-300); border-radius: 4px; }
.overflow-auto::-webkit-scrollbar-thumb:hover { background: var(--stone-400); }

/* -------- Print -------- */
@media print {
  body { background: white; }
  .fixed, header { display: none; }
}

<script>
(function() {
  const SUPABASE_URL = "https://wuovhnuqorgbgqtlhpdg.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1b3ZobnVxb3JnYmdxdGxocGRnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4NzE3MzMsImV4cCI6MjA5NDQ0NzczM30.1HP1kM-Z3KjMLY2EmP3R1zQwSUlNLsvDlb3NDdPqoMA";

  async function sbReq(method, id, body) {
    const url = SUPABASE_URL + "/rest/v1/drafts" + (id ? "?id=eq." + encodeURIComponent(id) : "");
    const res = await fetch(url, {
      method,
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": method === "POST" ? "resolution=merge-duplicates" : ""
      },
      body: body ? JSON.stringify(body) : undefined
    });
    if (!res.ok) throw new Error("Supabase " + res.status);
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  // localStorage fallback
  const lsStorage = {
    get: async (key) => { try { const v = localStorage.getItem(key); return v != null ? {key, value: v} : null; } catch { return null; } },
    set: async (key, value) => { try { localStorage.setItem(key, value); return {key, value}; } catch { return null; } },
    delete: async (key) => { try { localStorage.removeItem(key); return {key, deleted: true}; } catch { return null; } },
    list: async (prefix = "") => { try { return {keys: Object.keys(localStorage).filter(k => k.startsWith(prefix))}; } catch { return {keys: []}; } }
  };

  // Supabase storage — same interface
  const sbStorage = {
    get: async (key) => {
      try {
        const rows = await sbReq("GET", key);
        if (rows && rows.length > 0) return {key, value: rows[0].data};
        return lsStorage.get(key);
      } catch { return lsStorage.get(key); }
    },
    set: async (key, value) => {
      try {
        await sbReq("POST", null, {id: key, name: key, data: value});
        lsStorage.set(key, value);
        return {key, value};
      } catch(err) { throw err; }
    },
    delete: async (key) => {
      try {
        await sbReq("DELETE", key);
        lsStorage.delete(key);
        return {key, deleted: true};
      } catch { return lsStorage.delete(key); }
    },
    list: async (prefix = "") => {
      try {
        const url = SUPABASE_URL + "/rest/v1/drafts?id=like." + encodeURIComponent(prefix + "%") + "&select=id";
        const res = await fetch(url, {
          headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
        });
        if (!res.ok) throw new Error("list failed");
        const rows = await res.json();
        const sbKeys = rows.map(r => r.id);
        const lsKeys = (await lsStorage.list(prefix)).keys || [];
        const merged = [...new Set([...sbKeys, ...lsKeys])];
        return {keys: merged};
      } catch { return lsStorage.list(prefix); }
    }
  };

  window.storage = sbStorage;
})();
</script>
